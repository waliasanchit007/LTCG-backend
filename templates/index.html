<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Investment Dashboard</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; padding-top: 20px; }
    .card-summary { margin-bottom: 20px; }
    .toggle-details { cursor: pointer; color: #007bff; text-decoration: underline; }
    .details-section { display: none; margin-top: 10px; }
    .section-title { border-bottom: 2px solid #dee2e6; margin-bottom: 15px; padding-bottom: 5px; }
    .fund-card { margin-bottom: 20px; }
    .info-link { font-size: 0.9em; margin-left: 5px; }
    .clickable { cursor: pointer; color: #007bff; text-decoration: underline; }
    /* File-upload styling */
    #file-upload-section { margin-bottom: 20px; padding: 15px; background: #fff; border: 1px solid #ccc; border-radius: 5px; }
    #uploaded-files { margin-bottom: 10px; }
    .uploaded-file { display: inline-block; background: #e9ecef; padding: 5px 10px; border-radius: 15px; margin-right: 5px; margin-bottom: 5px; }
    .uploaded-file span.remove { margin-left: 8px; cursor: pointer; color: red; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">Your Investment Dashboard</h1>
    <!-- File Upload Section -->
    <div id="file-upload-section" class="mb-4">
      <h3>Upload Your CAS Statement PDF(s)</h3>
      <p id="upload-instructions" class="text-muted">Select a PDF file and it will be uploaded automatically.</p>
      <input type="file" id="file-input" accept=".pdf" class="form-control-file">
      <input type="password" id="password-input" placeholder="Enter password if PDF is encrypted" style="display: none;" class="form-control mt-2">
      <button id="add-button" class="btn btn-secondary mt-2" style="display: none;">Add Another PDF</button>
      <div id="uploaded-files" class="mt-2"></div>
      <div id="upload-status" class="mt-2"></div>
    </div>
    <!-- Dashboard Section -->
    <div id="dashboard" style="display: none;">
      <h2 class="section-title">Overall Investment Summary</h2>
      <div class="row" id="overall-summary">
        <div class="col-md-4">
          <div class="card card-summary">
            <div class="card-body">
              <h5 class="card-title">Investment Summary</h5>
              <ul class="list-group" id="investment-summary"></ul>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card card-summary">
            <div class="card-body">
              <h5 class="card-title">Realized Gains</h5>
              <ul class="list-group" id="realized-summary"></ul>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card card-summary">
            <div class="card-body">
              <h5 class="card-title">Unrealized Gains</h5>
              <ul class="list-group" id="unrealized-summary"></ul>
            </div>
          </div>
        </div>
      </div>
      <h2 class="section-title">
        Long-Term Gains & Tax
        <a href="#" id="ltcg-link" class="info-link">[View Details]</a>
      </h2>
      <div class="row">
        <div class="col-md-6">
          <div class="card card-summary">
            <div class="card-body">
              <ul class="list-group" id="ltcg-summary"></ul>
            </div>
          </div>
        </div>
      </div>
      <h2 class="section-title">Funds by AMC</h2>
      <div id="funds-container"></div>
    </div>

    <!-- Modals omitted for brevity -->

    <div id="error-message" class="alert alert-danger" style="display: none;"></div>
  </div>

  <!-- jQuery, Popper.js, Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script>
    var combinedResults = [];

    function formatINR(num) {
      if(num === undefined || num === null) return "₹0.00";
      return num.toLocaleString('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2 });
    }

    function xnpv(rate, cashFlows) {
      let t0 = Math.min(...cashFlows.map(cf => cf.date.getTime()));
      return cashFlows.reduce((sum, cf) => {
        let diffDays = (cf.date.getTime() - t0) / (1000 * 3600 * 24);
        return sum + cf.amount / Math.pow(1 + rate, diffDays / 365);
      }, 0);
    }

    function xirr(cashFlows, guess = 0.1, tol = 1e-6, maxIter = 100) {
      let rate = guess;
      for (let i = 0; i < maxIter; i++) {
        let f = xnpv(rate, cashFlows);
        let f1 = xnpv(rate + tol, cashFlows);
        let derivative = (f1 - f) / tol;
        if (derivative === 0) break;
        let newRate = rate - f / derivative;
        if (Math.abs(newRate - rate) < tol) return newRate;
        rate = newRate;
      }
      return rate;
    }

    // Merge duplicate schemes (by folio and scheme name).
    function combineData(resultsArray) {
      let combined = {
        data: { folios: [], investor_info: {}, statement_period: {} },
        msg: "success", status: "success"
      };
      let amcMap = {};
      resultsArray.forEach(result => {
        result.data.folios.forEach(folio => {
          let amcName = folio.amc.trim();
          if (!amcMap[amcName]) { amcMap[amcName] = { amc: folio.amc, schemes: [] }; }
          folio.schemes.forEach(scheme => {
            let key = scheme.folio + "_" + scheme.scheme;
            let existing = amcMap[amcName].schemes.find(s => (s.folio + "_" + s.scheme) === key);
            if (existing) {
              existing.transactions = (existing.transactions || []).concat(scheme.transactions || []);
              if (scheme.valuation && scheme.valuation.date) {
                if (!existing.valuation || new Date(scheme.valuation.date) > new Date(existing.valuation.date)) {
                  existing.valuation = scheme.valuation;
                }
              }
            } else {
              amcMap[amcName].schemes.push(scheme);
            }
          });
        });
      });
      combined.data.folios = Object.values(amcMap);
      if(resultsArray.length > 0) {
        combined.data.investor_info = resultsArray[0].data.investor_info;
        combined.data.statement_period = resultsArray[0].data.statement_period;
      }
      return combined;
    }

    function renderDashboard(data) {
      document.getElementById("dashboard").style.display = "block";
      document.getElementById("upload-status").textContent = "Data combined and analysis complete.";

      let overallCurrentMarketValue = 0, overallCurrentlyInvested = 0, overallProfit = 0;
      let realizedSummary = { currentFY: 0, lt: 0, st: 0 };
      let unrealizedSummary = { total: 0, lt: 0, st: 0 };
      let ltcgSummary = { eligibleUnits: 0, eligibleValue: 0, potentialTax: 0, unrealizedLTGain: 0 };
      let lockedOverall = { amount: 0, profit: 0 };
      let lockedDetailsArray = [], allWithdrawals = [];
      let fundsHtml = "", ltcgDetails = "";
      let overallRealizedGain = 0, firstXirr = null;
      
      // For combined XIRR: aggregate only transaction cash flows (exclude per-scheme final valuation)
      let combinedCashFlows = [];
      let totalFinalMarketValue = 0;

      data.data.folios.forEach(folio => {
        let amc = folio.amc;
        fundsHtml += `<div class="card fund-card"><div class="card-header"><strong>${amc}</strong></div><div class="card-body">`;
        folio.schemes.forEach(scheme => {
          if (scheme.scheme && (scheme.scheme.toLowerCase().includes("uclaim") || scheme.scheme.toLowerCase().includes("redemption"))) {
            return;
          }
          let sim = scheme.unrealized_tax_simulation.summary;
          overallCurrentMarketValue += sim.investment_summary.current_market_value;
          overallCurrentlyInvested += sim.investment_summary.currently_invested;
          overallProfit += sim.investment_summary.overall_profit;
          if (!firstXirr && sim.investment_summary.xirr !== null) { firstXirr = sim.investment_summary.xirr; }
          if (scheme.unrealized_tax_simulation.details && scheme.unrealized_tax_simulation.details.lot_details_realized) {
            scheme.unrealized_tax_simulation.details.lot_details_realized.forEach(tx => {
              overallRealizedGain += tx.gain;
            });
          }
          realizedSummary.currentFY += sim.realized.realized_total_gain_current_FY;
          realizedSummary.lt += sim.realized.realized_long_term_gain_current_FY;
          realizedSummary.st += sim.realized.realized_short_term_gain_current_FY;
          unrealizedSummary.total += sim.unrealized.unrealized_gain;
          unrealizedSummary.lt += sim.unrealized.unrealized_long_term_gain;
          unrealizedSummary.st += sim.unrealized.unrealized_short_term_gain;
          ltcgSummary.eligibleUnits += sim.ltcg_eligibility.eligible_units;
          ltcgSummary.eligibleValue += sim.ltcg_eligibility.eligible_current_value;
          ltcgSummary.potentialTax += sim.ltcg_eligibility.potential_tax_on_ltcg;
          ltcgSummary.unrealizedLTGain += sim.unrealized.unrealized_long_term_gain;
          
          let lockedData = sim.locked || scheme.locked;
          if (lockedData && lockedData.locked_in_amount > 0) {
            lockedOverall.amount += lockedData.locked_in_amount;
            lockedOverall.profit += lockedData.locked_in_profit;
            lockedDetailsArray.push({ fund: scheme.scheme, folio: scheme.folio, locked_in_amount: lockedData.locked_in_amount, locked_in_profit: lockedData.locked_in_profit });
          }
          
          if (sim.lot_details_realized && sim.lot_details_realized.length > 0) {
            sim.lot_details_realized.forEach(r => {
              allWithdrawals.push({ fund: scheme.scheme, folio: scheme.folio, redemption_date: r.redemption_date, amount: r.gain, units: r.units });
            });
          }
          
          if (sim.ltcg_eligibility.eligible_current_value > 0) {
            ltcgDetails += `<tr><td>${scheme.scheme}</td><td>${scheme.folio}</td><td>${formatINR(sim.investment_summary.current_market_value)}</td><td>${formatINR(sim.ltcg_eligibility.eligible_current_value)}</td><td>${formatINR(sim.unrealized.unrealized_long_term_gain)}</td></tr>`;
          }
          
          let detailsHtml = `
            <ul>
              <li><strong>Currently Invested:</strong> ${formatINR(sim.investment_summary.currently_invested)}</li>
              <li><strong>Overall Profit:</strong> ${formatINR(sim.investment_summary.overall_profit)} (${sim.investment_summary.profit_percentage}%)</li>
              <li><strong>Overall Realized Gain:</strong> ${formatINR(overallRealizedGain)}</li>
              <li><strong>Realized Gain (Current FY):</strong> ${formatINR(sim.realized.realized_total_gain_current_FY)}</li>
              <li><strong>Unrealized Gain:</strong> ${formatINR(sim.investment_summary.current_market_value - sim.investment_summary.currently_invested)}
                  (LT: ${formatINR(sim.unrealized.unrealized_long_term_gain)}, ST: ${formatINR(sim.unrealized.unrealized_short_term_gain)})
              </li>
              <li><strong>XIRR:</strong> ${sim.investment_summary.xirr ? sim.investment_summary.xirr.toFixed(2) + '%' : 'N/A'}</li>
            </ul>
          `;
          
          fundsHtml += `<div class="card mb-2">
                          <div class="card-body">
                            <h5 class="card-title"><a href="https://coin.zerodha.com/mf/fund/${scheme.isin}" target="_blank">${scheme.scheme}</a></h5>
                            <p class="card-text">
                              <strong>Folio:</strong> ${scheme.folio}<br>
                              <strong>Current Market Value:</strong> ${formatINR(sim.investment_summary.current_market_value)}<br>
                              <strong>Profit:</strong> ${formatINR(sim.investment_summary.overall_profit)} (${sim.investment_summary.profit_percentage}%)
                            </p>
                            <p class="toggle-details" onclick="toggleDetails(this)">View Detailed Fund Performance</p>
                            <div class="details-section">${detailsHtml}</div>
                          </div>
                        </div>`;
          
          // Collect transaction cash flows.
          if (scheme.transactions && scheme.transactions.length > 0) {
            scheme.transactions.forEach(tx => {
              let txDate = new Date(tx.date);
              let units = parseFloat(tx.units || 0);
              let nav = parseFloat(tx.nav || 0);
              let amount = 0;
              if (units > 0) {
                amount = - (nav * units);
              } else if (units < 0) {
                amount = tx.amount ? parseFloat(tx.amount) : (nav * Math.abs(units));
              }
              combinedCashFlows.push({ date: txDate, amount: amount });
            });
          }
          // Sum final market value for this scheme.
          if (scheme.unrealized_tax_simulation && scheme.unrealized_tax_simulation.investment_summary) {
            totalFinalMarketValue += scheme.unrealized_tax_simulation.investment_summary.current_market_value;
          }
        });
        fundsHtml += `</div></div>`;
      });
      
      // Debug logs for cash flows.
      console.log("DEBUG: Combined transaction cash flows:", combinedCashFlows);
      console.log("DEBUG: Total final market value (single final cash flow):", totalFinalMarketValue);
      
      // Calculate overall XIRR.
      let overallXirr = 0;
      if (combinedResults.length > 1 && combinedCashFlows.length > 0) {
          // Add one final cash flow representing the portfolio's total market value.
          combinedCashFlows.push({ date: new Date(), amount: totalFinalMarketValue });
          // Aggregate cash flows by date.
          let aggregated = {};
          combinedCashFlows.forEach(cf => {
              let dateKey = cf.date.toISOString().split('T')[0];
              aggregated[dateKey] = (aggregated[dateKey] || 0) + cf.amount;
          });
          let aggregatedCashFlows = [];
          for (let dateKey in aggregated) {
              aggregatedCashFlows.push({ date: new Date(dateKey), amount: aggregated[dateKey] });
          }
          console.log("DEBUG: Aggregated cash flows:", aggregatedCashFlows);
          overallXirr = xirr(aggregatedCashFlows) * 100;
          console.log("DEBUG: Computed combined XIRR:", overallXirr);
      } else {
          overallXirr = firstXirr !== null ? firstXirr : 0;
      }
      
      const invSummaryHtml = `
        <li class="list-group-item"><strong>Current Market Value:</strong> ${formatINR(overallCurrentMarketValue)}</li>
        <li class="list-group-item"><strong>Currently Invested:</strong> ${formatINR(overallCurrentlyInvested)}</li>
        <li class="list-group-item"><strong>Overall Profit:</strong> ${formatINR(overallProfit)}</li>
        <li class="list-group-item"><strong>Profit Percentage:</strong> ${overallCurrentlyInvested ? ((overallProfit/overallCurrentlyInvested)*100).toFixed(2) : 0}%</li>
        <li class="list-group-item"><strong>${combinedResults.length > 1 ? "Combined XIRR (Annual Return)" : "XIRR (Annual Return)"}:</strong> ${overallXirr.toFixed(2)}%</li>
        <li class="list-group-item">
          <strong>Locked (ELSS) Investment:</strong> ${formatINR(lockedOverall.amount)}
          <span id="locked-link" class="clickable">[View Details]</span>
        </li>
      `;
      document.getElementById("investment-summary").innerHTML = invSummaryHtml;
      document.getElementById("funds-container").innerHTML = fundsHtml;
      
      let lockedLinkElem = document.getElementById("locked-link");
      if (lockedLinkElem) {
        lockedLinkElem.addEventListener("click", (e) => {
          e.preventDefault();
          $("#lockedModal").modal("show");
        });
      }
      let ltcgElem = document.getElementById("ltcg-link");
      if (ltcgElem) {
        ltcgElem.addEventListener("click", (e) => {
          e.preventDefault();
          $("#ltcgModal").modal("show");
        });
      }
    }

    function toggleDetails(element) {
      const detailsSection = element.nextElementSibling;
      if (!detailsSection.style.display || detailsSection.style.display === "none") {
        detailsSection.style.display = "block";
        element.textContent = "Hide Detailed Fund Performance";
      } else {
        detailsSection.style.display = "none";
        element.textContent = "View Detailed Fund Performance";
      }
    }

    document.getElementById("add-button").style.display = "none";

    function uploadFile() {
      const fileInput = document.getElementById("file-input");
      if (fileInput.files.length === 0) return;
      const file = fileInput.files[0];
      document.getElementById("upload-status").textContent = "Uploading file...";
      const formData = new FormData();
      formData.append("file", file);
      
      const passwordInput = document.getElementById("password-input");
      if (passwordInput && passwordInput.value.trim() !== "") {
        formData.append("password", passwordInput.value.trim());
      }
      
      fetch("https://ltcg-backend.onrender.com/upload", {
        method: "POST",
        body: formData
      })
      .then(response => {
        if (!response.ok) {
          return response.json().then(errData => { throw new Error(errData.error); });
        }
        return response.json();
      })
      .then(data => {
        console.log("Parsed data received:", data);
        combinedResults.push(data);
        addUploadedFile(file.name);
        fileInput.value = "";
        fileInput.style.display = "none";
        document.getElementById("add-button").style.display = "inline-block";
        document.getElementById("upload-status").textContent = "File uploaded successfully.";
        if (passwordInput) { passwordInput.style.display = "none"; passwordInput.value = ""; }
        let combinedData = combineData(combinedResults);
        renderDashboard(combinedData);
      })
      .catch(error => {
        console.error("Error:", error);
        document.getElementById("error-message").style.display = "block";
        document.getElementById("error-message").textContent = "Error: " + error.message;
        if (error.message.toLowerCase().includes("encrypted")) {
          document.getElementById("password-input").style.display = "block";
        }
      });
    }

    function addUploadedFile(fileName) {
      const container = document.getElementById("uploaded-files");
      const fileItem = document.createElement("div");
      fileItem.className = "uploaded-file";
      fileItem.innerHTML = `${fileName} <span class="remove">&times;</span>`;
      fileItem.querySelector("span.remove").addEventListener("click", function() {
        container.removeChild(fileItem);
        combinedResults = [];
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("upload-status").textContent = "File removed. Please upload a new PDF.";
        document.getElementById("file-input").style.display = "block";
        document.getElementById("add-button").style.display = "none";
      });
      container.appendChild(fileItem);
    }

    document.getElementById("file-input").addEventListener("change", uploadFile);
    document.getElementById("add-button").addEventListener("click", () => {
      document.getElementById("file-input").style.display = "block";
      document.getElementById("upload-status").textContent = "Select another PDF file.";
    });
  </script>
</body>
</html>
